<!DOCTYPE html>

<head>

<title>Wendler 5/3/1</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22Wendler+5/3/1%22,%22short_name%22:%22531%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230b0d10%22,%22theme_color%22:%22%230b0d10%22}">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #0b0d10;
  --bg2:   #111418;
  --bg3:   #181c22;
  --line:  rgba(255,255,255,.07);
  --line2: rgba(255,255,255,.12);
  --tx:    #dde1ea;
  --tx2:   #7c8494;
  --tx3:   #434955;
  --teal:  #29c99a; --teal2: rgba(41,201,154,.13);
  --amber: #f0950a; --amb2:  rgba(240,149,10,.13);
  --blue:  #5b9cf6; --blu2:  rgba(91,156,246,.13);
  --coral: #f06b6b; --cor2:  rgba(240,107,107,.13);
  --purp:  #9b7fea; --pur2:  rgba(155,127,234,.13);
  --grn:   #45d48a; --grn2:  rgba(69,212,138,.10);
  --mono: 'DM Mono',monospace;
  --sans: 'Sora',sans-serif;
  --r: 12px; --rs: 8px;
  --tab-h: 60px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; }
body {
  background:var(--bg); color:var(--tx);
  font-family:var(--sans); font-size:14px; line-height:1.6;
  display:flex; flex-direction:column;
}

/* ── APP SHELL ── */
.app-header {
  flex-shrink:0;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  padding:12px 16px 10px;
  padding-top:calc(12px + env(safe-area-inset-top, 0px));
}
.app-header-row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.app-logo { font-size:17px; font-weight:600; letter-spacing:-.3px; }
.app-logo em { color:var(--teal); font-style:normal; }
.app-week-info { font-size:11px; color:var(--tx3); font-family:var(--mono); }
.settings-btn {
  width:34px; height:34px; border-radius:var(--rs);
  border:1px solid var(--line2); background:transparent;
  color:var(--tx2); font-size:16px; display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}

/* ── SCROLL AREA ── */
.scroll-area {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:0 0 calc(var(--tab-h) + var(--safe-b) + 12px);
}

/* ── BOTTOM TAB BAR ── */
.tab-bar {
  flex-shrink:0;
  position:fixed; bottom:0; left:0; right:0;
  height:calc(var(--tab-h) + var(--safe-b));
  background:rgba(11,13,16,.96);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
  display:flex; align-items:flex-start;
  padding-top:6px;
  padding-bottom:var(--safe-b);
  z-index:100;
}
.tab-item {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 4px; border:none; background:transparent;
  color:var(--tx3); font-family:var(--sans); font-size:10px;
  transition:color .15s;
}
.tab-item .ti { font-size:20px; line-height:1; }
.tab-item.on { color:var(--teal); }
.tab-item.amber-on { color:var(--amber); }
.tab-item.purp-on  { color:var(--purp); }

/* ── WEEK SELECTOR (horizontal scroll) ── */
.week-scroller {
  display:flex; gap:6px; overflow-x:auto;
  padding:12px 16px; scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}
.week-scroller::-webkit-scrollbar { display:none; }
.wk-chip {
  flex-shrink:0; scroll-snap-align:start;
  padding:7px 14px; border-radius:20px;
  border:1px solid var(--line); font-size:12px;
  background:transparent; color:var(--tx3);
  font-family:var(--sans); white-space:nowrap;
  transition:all .15s;
}
.wk-chip span { font-size:9px; font-family:var(--mono); opacity:.6; margin-left:3px; }
.wk-chip.on { background:var(--bg3); color:var(--tx); border-color:var(--line2); }
.wk-chip.deload.on { background:var(--pur2); color:var(--purp); border-color:rgba(155,127,234,.35); }

/* ── WEEK NOTE + CYCLE ── */
.wk-note {
  margin:0 16px 10px; padding:10px 13px;
  background:var(--bg2); border-radius:var(--rs);
  border-left:2px solid var(--line2);
  font-size:12px; color:var(--tx2); line-height:1.65;
}
.cycle-row {
  display:flex; align-items:center; gap:7px;
  padding:0 16px 12px; overflow-x:auto; flex-wrap:nowrap;
}
.cycle-row::-webkit-scrollbar { display:none; }
.cycle-lbl { font-size:10px; color:var(--tx3); font-family:var(--mono); flex-shrink:0; }
.cyc-btn {
  flex-shrink:0; padding:4px 12px; border-radius:20px;
  border:1px solid var(--line); font-family:var(--mono);
  font-size:11px; background:transparent; color:var(--tx3); transition:all .15s;
}
.cyc-btn.on { background:var(--teal2); color:var(--teal); border-color:rgba(41,201,154,.35); }

/* ── TM STRIP ── */
.tm-strip {
  display:flex; gap:7px; overflow-x:auto;
  padding:0 16px 12px;
}
.tm-strip::-webkit-scrollbar { display:none; }
.tm-chip {
  flex-shrink:0; background:var(--bg2); border:1px solid var(--line);
  border-radius:var(--rs); padding:8px 12px; text-align:center;
}
.tm-chip-lbl { font-size:9px; color:var(--tx3); font-family:var(--mono); letter-spacing:.07em; text-transform:uppercase; }
.tm-chip-val { font-size:16px; font-weight:500; font-family:var(--mono); color:var(--tx); }
.tm-chip-val span { font-size:10px; color:var(--tx3); }

/* ── DAY CARDS ── */
.day-cards { padding:0 16px; display:flex; flex-direction:column; gap:10px; }
.day-card {
  background:var(--bg2); border:1px solid var(--line);
  border-radius:var(--r); overflow:hidden;
}
.day-card.z2-card { border-color:rgba(41,201,154,.25); }
.day-card.rest-card { opacity:.4; }
.day-card.z2-opt-card { border-style:dashed; opacity:.6; }

/* card header — tappable to expand/collapse */
.card-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 14px; cursor:pointer; user-select:none;
}
.card-hdr-left { display:flex; align-items:center; gap:10px; }
.card-day { font-size:14px; font-weight:500; }
.badge {
  font-size:9px; padding:2px 8px; border-radius:20px;
  font-family:var(--mono); white-space:nowrap;
}
.b-sq  { background:rgba(69,212,138,.12);  color:#7ee8b0; }
.b-dl  { background:rgba(240,107,107,.12); color:#f5a0a0; }
.b-bp  { background:rgba(91,156,246,.12);  color:#8fb8f8; }
.b-ohp { background:rgba(155,127,234,.12); color:#c0adf5; }
.b-z2  { background:var(--teal2); color:var(--teal); }
.b-rst { background:rgba(255,255,255,.05); color:var(--tx3); }
.card-chevron { font-size:12px; color:var(--tx3); transition:transform .2s; }
.card-chevron.open { transform:rotate(180deg); }

/* card body */
.card-body { padding:0 14px 14px; border-top:1px solid var(--line); }
.sec {
  font-size:9px; color:var(--tx3); font-family:var(--mono);
  letter-spacing:.07em; text-transform:uppercase; margin:10px 0 5px;
}
.lrow {
  display:flex; justify-content:space-between; align-items:center;
  padding:5px 0; border-bottom:1px solid var(--line);
}
.lrow:last-child { border-bottom:none; }
.lrow-w { font-size:12px; color:var(--tx); font-family:var(--mono); }
.lrow-r { font-size:11px; color:var(--tx2); font-family:var(--mono); }
.pr-pip { font-size:8px; background:var(--amb2); color:var(--amber); padding:1px 4px; border-radius:3px; margin-left:3px; }
.lift-yt {
  font-size:9px; background:var(--cor2); color:#f5a0a0;
  padding:2px 6px; border-radius:4px; font-family:var(--mono);
  margin-left:5px; text-decoration:none;
}

/* PR block */
.pr-blk {
  margin-top:10px; padding:10px 11px; border-radius:var(--rs);
  background:var(--amb2); border:1px solid rgba(240,149,10,.22);
}
.pr-blk-lbl { font-size:9px; color:rgba(240,149,10,.9); font-family:var(--mono); letter-spacing:.06em; text-transform:uppercase; margin-bottom:7px; }
.pr-blk-row { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.pr-inp {
  width:70px; padding:8px 10px; border-radius:var(--rs);
  border:1px solid rgba(240,149,10,.4); background:rgba(240,149,10,.07);
  color:var(--amber); font-family:var(--mono); font-size:16px;
  font-weight:500; outline:none; text-align:center;
}
.pr-inp:focus { border-color:var(--amber); }
.pr-inp::placeholder { color:rgba(240,149,10,.25); font-size:13px; }
.pr-unit { font-size:11px; color:var(--tx3); font-family:var(--mono); }
.sv-btn {
  flex:1; padding:8px 12px; border-radius:var(--rs);
  border:1px solid rgba(240,149,10,.3); background:rgba(240,149,10,.1);
  color:var(--amber); font-size:12px; font-weight:500;
  transition:all .15s;
}
.sv-btn:active { background:rgba(240,149,10,.25); }
.ok-tick { font-size:14px; color:var(--teal); opacity:0; transition:opacity .3s; }
.ok-tick.show { opacity:1; }
.pr-out { font-size:12px; font-family:var(--mono); color:var(--amber); margin-top:6px; min-height:16px; }

/* assist rows */
.arow { padding:6px 0; border-bottom:1px solid var(--line); }
.arow:last-child { border-bottom:none; }
.arow-top { display:flex; justify-content:space-between; align-items:flex-start; gap:6px; }
.arow-nm { display:flex; align-items:center; gap:5px; flex:1; min-width:0; }
.arow-name { font-size:12px; color:var(--tx); }
.arow-name.de { color:var(--purp); }
.arow-scheme { font-size:11px; color:var(--tx2); font-family:var(--mono); white-space:nowrap; }
.yt-lnk { font-size:9px; background:var(--cor2); color:#f5a0a0; padding:2px 5px; border-radius:4px; font-family:var(--mono); text-decoration:none; white-space:nowrap; }
.arow-sub { font-size:10px; color:var(--tx3); margin-top:2px; line-height:1.5; }

/* weight input */
.wi-row { display:flex; align-items:center; gap:7px; margin-top:7px; }
.wi-inp {
  width:80px; padding:8px 10px; border-radius:var(--rs);
  font-family:var(--mono); font-size:16px; font-weight:500;
  outline:none; text-align:center;
}
.wi-inp.heavy { border:1px solid rgba(91,156,246,.35); background:rgba(91,156,246,.07); color:var(--blue); }
.wi-inp.heavy:focus { border-color:var(--blue); }
.wi-inp.de    { border:1px solid rgba(155,127,234,.35); background:rgba(155,127,234,.07); color:var(--purp); }
.wi-inp.de:focus    { border-color:var(--purp); }
.wi-inp::placeholder { color:rgba(255,255,255,.15); font-size:12px; }
.wi-unit { font-size:11px; color:var(--tx3); font-family:var(--mono); }
.wi-sv {
  flex:1; padding:8px; border-radius:var(--rs);
  font-size:12px; font-weight:500; transition:all .15s;
}
.wi-sv.heavy { border:1px solid rgba(91,156,246,.3); background:rgba(91,156,246,.1); color:var(--blue); }
.wi-sv.heavy:active { background:rgba(91,156,246,.25); }
.wi-sv.de    { border:1px solid rgba(155,127,234,.3); background:rgba(155,127,234,.1); color:var(--purp); }
.wi-sv.de:active    { background:rgba(155,127,234,.25); }
.wi-saved { font-size:10px; font-family:var(--mono); margin-top:4px; min-height:13px; }
.wi-saved.heavy { color:rgba(91,156,246,.7); }
.wi-saved.de    { color:rgba(155,127,234,.7); }

/* DE skip */
.de-skip {
  margin-top:8px; padding:8px 10px; border-radius:var(--rs);
  background:var(--pur2); border:1px solid rgba(155,127,234,.2);
  font-size:10px; color:rgba(155,127,234,.7); font-family:var(--mono);
}

/* deload note */
.dl-note { font-size:10px; color:var(--tx3); font-family:var(--mono); margin-top:8px; padding-top:8px; border-top:1px solid var(--line); line-height:1.7; }

/* Z2 card */
.z2-stat { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--line); }
.z2-stat:last-of-type { border-bottom:none; }
.z2-stat-k { font-size:12px; color:var(--tx2); }
.z2-stat-v { font-size:12px; color:var(--tx); font-family:var(--mono); }
.z2-bar-wrap { height:5px; background:var(--bg3); border-radius:3px; margin:8px 0 4px; position:relative; overflow:hidden; }
.z2-bar-fill { position:absolute; top:0; height:100%; background:var(--teal); border-radius:3px; }
.z2-bar-lbl { font-size:9px; color:var(--tx3); font-family:var(--mono); margin-bottom:8px; }
.z2-mod { font-size:11px; color:var(--tx2); padding:4px 0; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; }
.z2-mod:last-child { border-bottom:none; }
.z2-mod-tag { font-size:9px; color:var(--tx3); font-family:var(--mono); }
.z2-tip { font-size:10px; color:var(--tx3); margin-top:8px; padding:7px 9px; background:rgba(255,255,255,.03); border-radius:var(--rs); border:1px solid var(--line); line-height:1.6; }

/* ── SETTINGS SCREEN ── */
.settings-screen { padding:16px; }
.settings-title { font-size:16px; font-weight:500; margin-bottom:16px; }
.settings-section { background:var(--bg2); border:1px solid var(--line); border-radius:var(--r); overflow:hidden; margin-bottom:14px; }
.settings-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px; border-bottom:1px solid var(--line);
  gap:12px;
}
.settings-row:last-child { border-bottom:none; }
.settings-row-label { font-size:13px; color:var(--tx); }
.settings-row-sub { font-size:10px; color:var(--tx3); font-family:var(--mono); margin-top:2px; }
.s-num-inp {
  width:80px; padding:8px 10px; border-radius:var(--rs);
  border:1px solid var(--line2); background:var(--bg3);
  color:var(--tx); font-family:var(--mono); font-size:15px;
  font-weight:500; outline:none; text-align:center;
}
.s-num-inp:focus { border-color:rgba(41,201,154,.5); }
.lvl-seg { display:flex; gap:5px; }
.lvl-seg-btn {
  padding:6px 12px; border-radius:var(--rs);
  border:1px solid var(--line2); font-size:11px;
  background:transparent; color:var(--tx2); transition:all .15s;
}
.lvl-seg-btn.beg.on { background:var(--grn2); color:var(--grn); border-color:rgba(69,212,138,.3); }
.lvl-seg-btn.int.on { background:var(--blu2); color:var(--blue); border-color:rgba(91,156,246,.3); }
.lvl-seg-btn.adv.on { background:var(--cor2); color:var(--coral); border-color:rgba(240,107,107,.3); }
.s-tm-hint { font-size:11px; color:var(--tx3); font-family:var(--mono); }
.s-tm-hint span { color:var(--teal); }
.lvl-note-s { font-size:11px; padding:10px 16px; line-height:1.7; }
.lvl-note-s.beg { background:var(--grn2); color:#7ee8b0; }
.lvl-note-s.int { background:var(--blu2); color:#8fb8f8; }
.lvl-note-s.adv { background:var(--cor2); color:#f5a0a0; }
.reset-btn {
  width:100%; padding:14px; border-radius:var(--r);
  background:var(--cor2); border:1px solid rgba(240,107,107,.3);
  color:var(--coral); font-size:13px; font-weight:500;
  margin-top:6px;
}

/* ── PR LOG SCREEN ── */
.pr-screen { padding:16px; }
.pr-sum-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:18px; }
.pr-sum-card { background:var(--bg2); border:1px solid var(--line); border-radius:var(--r); padding:13px; }
.pr-sum-lift { font-size:9px; color:var(--tx3); font-family:var(--mono); letter-spacing:.08em; text-transform:uppercase; margin-bottom:4px; }
.pr-sum-e1rm { font-size:22px; font-weight:500; font-family:var(--mono); color:var(--amber); }
.pr-sum-e1rm span { font-size:11px; color:var(--tx3); }
.pr-sum-meta { font-size:9px; color:var(--tx3); font-family:var(--mono); margin-top:2px; }
.pr-sum-vs { font-size:10px; font-family:var(--mono); margin-top:5px; padding:2px 7px; border-radius:3px; display:inline-block; }
.pr-sum-vs.up { background:rgba(41,201,154,.1); color:var(--teal); }
.pr-sum-vs.dn { background:var(--cor2); color:var(--coral); }
.pr-sum-empty { font-size:11px; color:var(--tx3); font-family:var(--mono); margin-top:6px; }
.pr-sect { background:var(--bg2); border:1px solid var(--line); border-radius:var(--r); padding:14px; margin-bottom:10px; }
.pr-sect-hd { font-size:10px; color:var(--tx2); font-family:var(--mono); letter-spacing:.07em; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:7px; }
.pr-chart { display:flex; align-items:flex-end; gap:7px; height:72px; margin-bottom:12px; }
.pr-bar-w { display:flex; flex-direction:column; align-items:center; gap:2px; flex:1; min-width:0; }
.pr-bar-v { font-size:8px; color:var(--amber); font-family:var(--mono); white-space:nowrap; }
.pr-bar { width:100%; border-radius:3px 3px 0 0; background:rgba(240,149,10,.18); min-height:4px; }
.pr-bar.best { background:var(--amber); }
.pr-bar-l { font-size:8px; color:var(--tx3); font-family:var(--mono); white-space:nowrap; }
.pr-tbl { width:100%; border-collapse:collapse; }
.pr-tbl th { font-size:9px; color:var(--tx3); font-family:var(--mono); text-transform:uppercase; text-align:left; padding:5px 8px; border-bottom:1px solid var(--line2); }
.pr-tbl td { font-size:11px; padding:6px 8px; border-bottom:1px solid var(--line); font-family:var(--mono); color:var(--tx2); }
.pr-tbl tr:last-child td { border-bottom:none; }
.td-e { color:var(--amber); font-weight:500; }
.td-d.up { color:var(--teal); } .td-d.dn { color:var(--coral); } .td-d.eq { color:var(--tx3); }
.pr-empty { font-size:12px; color:var(--tx3); font-family:var(--mono); padding:20px; text-align:center; background:var(--bg2); border-radius:var(--r); border:1px dashed var(--line2); margin-bottom:12px; }
.view-title { font-size:16px; font-weight:500; margin-bottom:4px; }
.view-sub { font-size:11px; color:var(--tx3); font-family:var(--mono); margin-bottom:16px; }

/* ── PROGRESSION ── */
.prog-card { background:var(--bg2); border:1px solid var(--line); border-radius:var(--r); padding:14px; margin-bottom:10px; }
.prog-card-ttl { font-size:12px; font-weight:500; margin-bottom:10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.prog-chart { display:flex; align-items:flex-end; gap:6px; height:64px; margin-bottom:10px; }
.pg-bar-w { display:flex; flex-direction:column; align-items:center; gap:2px; flex:1; min-width:0; }
.pg-bar-v { font-size:8px; font-family:var(--mono); white-space:nowrap; }
.pg-bar { width:100%; border-radius:3px 3px 0 0; min-height:4px; }
.pg-bar-l { font-size:8px; color:var(--tx3); font-family:var(--mono); white-space:nowrap; }
.prog-tbl { width:100%; border-collapse:collapse; }
.prog-tbl th { font-size:9px; color:var(--tx3); font-family:var(--mono); text-transform:uppercase; text-align:left; padding:4px 7px; border-bottom:1px solid var(--line2); }
.prog-tbl td { font-size:11px; padding:5px 7px; border-bottom:1px solid var(--line); font-family:var(--mono); color:var(--tx2); }
.prog-tbl tr:last-child td { border-bottom:none; }
.pdelta { font-size:9px; font-family:var(--mono); padding:1px 5px; border-radius:3px; }
.pdelta.up { background:rgba(41,201,154,.1); color:var(--teal); }
.pdelta.dn { background:var(--cor2); color:var(--coral); }
.pdelta.eq { color:var(--tx3); }

<script>
// ═══════════════════════════════════════════════
//  SUPABASE CONFIG — 여기에 본인 값 입력
// ═══════════════════════════════════════════════
var SUPA_URL = '';   // e.g. 'https://xxxx.supabase.co'
var SUPA_KEY = '';   // anon public key
var USER_ID  = '';   // 기기 식별자 (아무 문자열, 예: 'myphone')

var STORE_KEY = 'w531_v1';
var supaClient = null;

function initSupabase() {
  if (!SUPA_URL || !SUPA_KEY) return;
  try {
    supaClient = supabase.createClient(SUPA_URL, SUPA_KEY);
    console.log('Supabase connected');
  } catch(e) { supaClient = null; }
}

// ── Local ──────────────────────────────────────
function loadLocal() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (raw) applyState(JSON.parse(raw));
  } catch(e) {}
}
function saveLocal() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(getState())); } catch(e) {}
}
function getState() {
  return {orm:ORM, tmBase:TM_BASE, age:AGE, level:LEVEL, week:WEEK, cycle:CYCLE, prLog:PR_LOG, asstLog:ASST_LOG};
}
function applyState(s) {
  if (!s) return;
  ORM      = s.orm      || ORM;
  TM_BASE  = s.tmBase   || null;
  AGE      = s.age      || AGE;
  LEVEL    = s.level    || LEVEL;
  WEEK     = (s.week    != null) ? s.week  : WEEK;
  CYCLE    = s.cycle    || CYCLE;
  PR_LOG   = s.prLog    || {};
  ASST_LOG = s.asstLog  || {};
}

// ── Cloud ──────────────────────────────────────
function syncBadge(status) {
  var b = document.getElementById('sync-badge');
  if (!b) return;
  if (status === 'syncing') {
    b.style.display = 'block';
    b.style.color = 'var(--amber)';
    b.style.borderColor = 'rgba(240,149,10,.3)';
    b.textContent = '⟳ sync';
  } else if (status === 'ok') {
    b.style.display = 'block';
    b.style.color = 'var(--teal)';
    b.style.borderColor = 'rgba(41,201,154,.3)';
    b.textContent = '✓ synced';
    setTimeout(function() {
      b.style.display = 'none';
    }, 3000);
  } else if (status === 'offline') {
    b.style.display = 'block';
    b.style.color = 'var(--tx3)';
    b.style.borderColor = 'var(--line)';
    b.textContent = '● offline';
  } else {
    b.style.display = 'none';
  }
}

async function pushCloud() {
  if (!supaClient || !USER_ID) return;
  syncBadge('syncing');
  try {
    var uid = USER_ID.trim() || 'default';
    var ts = new Date().toISOString();
    await supaClient.from('w531_data').upsert({
      user_id: uid,
      data: getState(),
      updated_at: ts
    }, {onConflict: 'user_id'});
    localStorage.setItem('w531_ts', String(new Date(ts).getTime()));
    syncBadge('ok');
  } catch(e) {
    syncBadge('offline');
  }
}

async function pullCloud() {
  if (!supaClient || !USER_ID) return false;
  try {
    var uid = USER_ID.trim() || 'default';
    var res = await supaClient.from('w531_data')
      .select('data, updated_at')
      .eq('user_id', uid)
      .single();
    if (res.data && res.data.data) {
      // Compare timestamps: use cloud if newer
      var cloudTs = new Date(res.data.updated_at||0).getTime();
      var localTs  = parseInt(localStorage.getItem('w531_ts')||'0', 10);
      if (cloudTs > localTs) {
        applyState(res.data.data);
        localStorage.setItem('w531_ts', String(cloudTs));
        saveLocal();
        return 'updated';
      }
      return 'already_latest';
    }
  } catch(e) { console.error('pullCloud error', e); }
  return false;
}

// ── Unified save (local + debounced cloud push) ─
var _pushTimer = null;
function saveState() {
  saveLocal();
  if (supaClient && USER_ID) {
    clearTimeout(_pushTimer);
    _pushTimer = setTimeout(pushCloud, 1500);
  }
}

// ── loadState: local first, then cloud merge ────
function loadState() {
  loadLocal();
}

async function initAndSync() {
  // load saved supabase config
  try {
    var sc = JSON.parse(localStorage.getItem('w531_supa')||'{}');
    if (sc.url) SUPA_URL = sc.url;
    if (sc.key) SUPA_KEY = sc.key;
    if (sc.uid) USER_ID  = sc.uid;
  } catch(e) {}
  initSupabase();
  loadLocal();
  if (supaClient && USER_ID) {
    syncBadge('syncing');
    await pullCloud();
  }
}

function calcBaseTM(){
  // Returns base TM (before bump): uses TM_BASE if set, else ORM × level%
  var lv=LVL[LEVEL];
  if(TM_BASE){
    return{sq:TM_BASE.sq,dl:TM_BASE.dl,bp:TM_BASE.bp,ohp:TM_BASE.ohp};
  }
  return{sq:R(ORM.sq*lv.tm),dl:R(ORM.dl*lv.tm),bp:R(ORM.bp*lv.tm),ohp:R(ORM.ohp*lv.tm)};
}
function getTM(wi){
  var base=calcBaseTM(),b=WKS[wi]&&WKS[wi].bump;
  return{sq:base.sq+(b?5:0),dl:base.dl+(b?5:0),bp:base.bp+(b?2.5:0),ohp:base.ohp+(b?2.5:0)};
}
function prKey(lk,wi){return lk+'_'+wi;}
function aKey(dn,ai,wi){return dn+'_'+ai+'_'+wi;}
function el(id){return document.getElementById(id);}

function goTab(tab) {
  TAB = tab;
  var tabs = ['workout','pr','prog','settings'];
  var colors = {workout:'on', pr:'amber-on', prog:'purp-on', settings:'on'};
  for (var i=0;i<tabs.length;i++) {
    var btn = el('tab-'+tabs[i]);
    if (btn) btn.className = 'tab-item' + (tabs[i]===tab ? ' '+colors[tab] : '');
  }
  if (tab==='workout')  renderWorkout();
  else if (tab==='pr')  renderPR();
  else if (tab==='prog')renderProg();
  else                  renderSettings();
  el('scroll-area').scrollTop = 0;
}

// ═══════════════════════════════════════════════
//  PR / ASSIST SAVE
// ═══════════════════════════════════════════════
function prLive(iid){
  var wInp=el(iid+'_w');
  var enteredW=wInp?parseFloat(wInp.value):NaN;
  // Determine effective weight: entered or placeholder (auto)
  var autoW=parseFloat((wInp&&wInp.placeholder)||0);
  var w=(!isNaN(enteredW)&&enteredW>0)?enteredW:autoW;
  var r=parseInt(el(iid).value,10);
  var out=el(iid+'_out');if(!out)return;
  // Update the label showing which weight is being used
  var lbl=el(iid+'_wlbl');
  if(lbl)lbl.textContent=w>0?w+'kg':'—';
  if(w<=0||isNaN(r)||r<1){out.textContent='';return;}
  out.textContent='Est. 1RM: '+e1rm(w,r)+' kg';
}
function prSave(lk,wi,iid,okId){
  var r=parseInt(el(iid).value,10);
  if(isNaN(r)||r<1||r>60)return;
  // Use manually entered weight if provided, else fall back to auto-calculated
  var wInp=el(iid+'_w');
  var manualW=wInp?parseFloat(wInp.value):NaN;
  var TM=getTM(wi),pct=WKS[wi].sets[WKS[wi].sets.length-1][0];
  var autoW=R(TM[lk]*pct);
  var w2=(!isNaN(manualW)&&manualW>0)?R(manualW):autoW;
  var est=e1rm(w2,r);
  PR_LOG[prKey(lk,wi)]={lk:lk,wi:wi,w:w2,r:r,e:est,wl:WKS[wi].lbl,cycle:CYCLE};
  saveState();
  var out=el(iid+'_out');if(out)out.textContent='Est. 1RM: '+est+' kg';
  var ok=el(okId);if(ok){ok.classList.add('show');setTimeout(function(){ok.classList.remove('show');},1600);}
}
function awSave(dn,ai,wi,iid,okId){
  var v=parseFloat(el(iid).value);if(isNaN(v)||v<=0)return;
  var d=null;for(var i=0;i<DAYS.length;i++){if(DAYS[i].name===dn){d=DAYS[i];break;}}
  var aname=d&&d.assist&&d.assist[ai]?d.assist[ai].nm:'';
  var k=aKey(dn,ai,wi);
  if(!ASST_LOG[k])ASST_LOG[k]=[];
  var found=-1;
  for(var j=0;j<ASST_LOG[k].length;j++){if(ASST_LOG[k][j].cycle===CYCLE){found=j;break;}}
  var entry={kg:v,cycle:CYCLE,aname:aname,dn:dn,wi:wi,wl:WKS[wi].lbl};
  if(found>=0)ASST_LOG[k][found]=entry;else ASST_LOG[k].push(entry);
  saveState();
  var sv=el(iid+'_sv');if(sv)sv.textContent=v+'kg 저장 (C'+CYCLE+')';
  var ok=el(okId);if(ok){ok.classList.add('show');setTimeout(function(){ok.classList.remove('show');},1600);}
}
function toggleCard(name){
  EXPANDED[name]=!EXPANDED[name];
  var body=el('cb-'+name),chev=el('cc-'+name);
  if(!body||!chev)return;
  body.style.display=EXPANDED[name]?'block':'none';
  chev.className='card-chevron'+(EXPANDED[name]?' open':'');
}
function setCycle(c){CYCLE=c;EXPANDED={};saveState();renderWorkout();}
function goWeek(i){
  var wasDeload = (WEEK === 6);
  WEEK=i; EXPANDED={}; saveState(); renderWorkout();
  // Show cycle-complete modal when leaving Wk7 (deload) to Wk1
  if(wasDeload && i===0){ showCycleModal(); }
}

  h+='<span class="pr-unit">kg</span>';

  h+=' placeholder="reps" id="'+iid+'" value="'+preR+'"';

  h+='<span class="pr-unit">reps</span>';
  h+='<button class="sv-btn" onclick="prSave(\'' +lk+ '\',' +wi+ ',\'' +iid+ '\',\'' +oid+ '\')">Save</button>';
  h+='<span class="ok-tick" id="'+oid+'">&#10003;</span>';
  h+='</div>';
  h+='<div style="font-size:9px;color:var(--tx3);font-family:var(--mono);margin-top:3px">';
  h+='기준 무게: <span id="'+iid+'_wlbl" style="color:var(--amber)">'+autoW+'kg</span>';

  h+='</div>';
  h+='<div class="pr-out" id="'+iid+'_out">'+preOut+'</div>';
  h+='</div>';
  return h;
}

function mkAssistRow(a,dn,ai,wi){

    +'</div>'

function mkZ2Card(d,optional){

      +'</div>';

    +'<div class="z2-stat"><span class="z2-stat-k">Duration</span><span class="z2-stat-v">'+lv.z2d+'</span></div>'
    +'<div class="z2-stat"><span class="z2-stat-k">Target HR</span><span class="z2-stat-v">'+hr.lo+'–'+hr.hi+' bpm</span></div>'
    +'<div class="z2-bar-wrap"><div class="z2-bar-fill" style="left:'+lo+'%;width:'+wid+'%"></div></div>'
    +'<div class="z2-bar-lbl">'+hr.lo+' ← Zone 2 → '+hr.hi+' / max '+hr.max+'</div>'
    +'<div class="sec">Modalities</div>';
  for(var i=0;i<Z2M.length;i++)h+='<div class="z2-mod"><span>'+Z2M[i].n+'</span><span class="z2-mod-tag">'+Z2M[i].t+'</span></div>';
  h+='<div class="z2-tip">'+(d.z2note||'')+'</div></div></div>';

}

// ═══════════════════════════════════════════════
//  WORKOUT TAB
// ═══════════════════════════════════════════════
var DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function getTodayName() {
  return DAY_NAMES[new Date().getDay()];
}

function renderWorkout(){
  var w=WKS[WEEK],lv=LVL[LEVEL],TM=getTM(WEEK);
  var isPeak=!!w.peak,isDeload=!!w.deload;

  // Auto-expand today's card if nothing is manually expanded yet
  var todayName = getTodayName();
  var anyExpanded = false;
  for (var k in EXPANDED) { if (EXPANDED[k]) { anyExpanded = true; break; } }
  if (!anyExpanded) {
    EXPANDED[todayName] = true;
  }

  // update header — show today's day name
  el('hdr-info').textContent = WKS[WEEK].lbl + ' · C' + CYCLE + ' · ' + todayName;

  var h = '';

  // cycle selector — 상단
  h += '<div class="cycle-row"><span class="cycle-lbl">Cycle</span>';
  for(var c=1;c<=5;c++)h+='<button class="cyc-btn'+(c===CYCLE?' on':'')+'" onclick="setCycle('+c+')">C'+c+'</button>';
  h += '</div>';

  // week chips — cycle 아래
  h += '<div class="week-scroller" id="week-scroller">';
  for(var i=0;i<WKS.length;i++){
    h+='<button class="wk-chip'+(WKS[i].deload?' deload':'')+(i===WEEK?' on':'')+'" onclick="goWeek('+i+')">'
      +WKS[i].lbl+'<span>'+WKS[i].sub+'</span></button>';
  }
  h += '</div>';

  // week note
  h += '<div class="wk-note">'+WN[WEEK]+'</div>';

  // TM strip
  var tmKeys=[['sq','SQ'],['dl','DL'],['bp','BP'],['ohp','OHP']];
  h += '<div class="tm-strip">';
  for(var ti=0;ti<tmKeys.length;ti++){
    h+='<div class="tm-chip"><div class="tm-chip-lbl">'+tmKeys[ti][1]+' TM</div>'
      +'<div class="tm-chip-val">'+TM[tmKeys[ti][0]]+'<span>kg</span></div></div>';
  }
  h += '</div>';

  // day cards
  h += '<div class="day-cards">';
  for(var di=0;di<DAYS.length;di++){
    var d=DAYS[di];
    if(d.isZ2)    {h+=mkZ2Card(d,false);continue;}
    if(d.isZ2opt) {h+=mkZ2Card(d,true); continue;}
    if(d.isRest){
      h+='<div class="day-card rest-card">'
        +'<div class="card-hdr"><div class="card-hdr-left"><span class="card-day">'+d.name+'</span><span class="badge b-rst">Rest</span></div></div>'
        +'</div>';
      continue;
    }

    var isOpen=!!EXPANDED[d.name];
    var tm=TM[d.lift];
    h+='<div class="day-card">';
    h+='<div class="card-hdr" onclick="toggleCard(\''+d.name+'\')">'
      +'<div class="card-hdr-left"><span class="card-day">'+d.name+'</span><span class="badge '+d.badge+'">'+d.bl+'</span></div>'
      +'<span class="card-chevron'+(isOpen?' open':'')+'" id="cc-'+d.name+'">▼</span>'
      +'</div>';
    h+='<div class="card-body" id="cb-'+d.name+'" style="display:'+(isOpen?'block':'none')+'">';

    if(isDeload){
      h+='<div class="sec">Deload Sets</div>';
      [[.4,5],[.5,5],[.6,5]].forEach(function(s){
        h+='<div class="lrow"><span class="lrow-w">'+KG(tm*s[0])+'</span><span class="lrow-r">'+s[1]+' reps (fixed)</span></div>';
      });
      h+='<div class="dl-note">AMRAP 없음 · Joker 없음<br>다음 TM: Squat/DL +5kg · Bench/OHP +2.5kg</div>';
    } else {
      // warmup
      h+='<div class="sec">Warmup</div>';
      for(var wi2=0;wi2<lv.wu.length;wi2++)
        h+='<div class="lrow"><span class="lrow-w">'+KG(tm*lv.wu[wi2][0])+'</span><span class="lrow-r">'+lv.wu[wi2][1]+' reps</span></div>';
      // main
      h+='<div class="sec">Main <a class="lift-yt" href="'+LYT[d.lift]+'" target="_blank">▶ '+LL[d.lift]+'</a></div>';
      for(var ms=0;ms<w.sets.length;ms++){
        var pct=w.sets[ms][0],rps=String(w.sets[ms][1]),isPR=rps.indexOf('+')!==-1;
        h+='<div class="lrow"><span class="lrow-w">'+KG(tm*pct)+(isPR?'<span class="pr-pip">PR</span>':'')+'</span><span class="lrow-r">'+rps+' reps</span></div>';
      }
      h+=mkPrBlock(d.lift,WEEK);
    }

    // split assist
    var heavyItems=[],deItems=[];
    for(var ai=0;ai<d.assist.length;ai++){
      if(d.assist[ai].de)deItems.push({a:d.assist[ai],i:ai});
      else heavyItems.push({a:d.assist[ai],i:ai});
    }

    // DE first
    if(!isDeload){
      if(!isPeak&&deItems.length){
        h+='<div class="sec" style="color:rgba(155,127,234,.85)">⚡ Machine DE · 40-50% · 휴식 45s</div>';
        for(var dei=0;dei<deItems.length;dei++)h+=mkAssistRow(deItems[dei].a,d.name,deItems[dei].i,WEEK);
      } else if(isPeak){
        h+='<div class="de-skip">⚡ DE 제외 — 피크 주차 CNS 최대 출력 보존</div>';
      }
    }
    // heavy assistance
    if(heavyItems.length){
      h+='<div class="sec">Assistance · '+lv.fsl+' · 70-80%</div>';
      for(var hi2=0;hi2<heavyItems.length;hi2++)h+=mkAssistRow(heavyItems[hi2].a,d.name,heavyItems[hi2].i,WEEK);
    }

    h+='</div></div>'; // card-body + day-card
  }
  h+='</div>'; // day-cards
  el('mc').innerHTML=h;

  // scroll active week chip into view
  setTimeout(function(){
    var scroller=el('week-scroller');
    if(!scroller)return;
    var chips=scroller.querySelectorAll('.wk-chip');
    if(chips[WEEK])chips[WEEK].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },50);
}

// ═══════════════════════════════════════════════
//  PR TAB
// ═══════════════════════════════════════════════
function renderPR(){
  var lifts=['sq','dl','bp','ohp'],total=Object.keys(PR_LOG).length;
  var h='<div class="pr-screen">';
  h+='<div class="view-title">PR Log</div>'
    +'<div class="view-sub">Est. 1RM · '+total+'세트 기록됨'+(total?'&nbsp;&nbsp;<button onclick="clrPR()" style=\'font-size:10px;padding:3px 10px;border-radius:6px;border:1px solid rgba(240,107,107,.3);background:transparent;color:var(--coral)\'>초기화</button>':'')+'</div>';

  // summary
  h+='<div class="pr-sum-grid">';
  for(var li=0;li<lifts.length;li++){
    var lk=lifts[li],ents=[];
    for(var k in PR_LOG)if(PR_LOG[k].lk===lk)ents.push(PR_LOG[k]);
    ents.sort(function(a,b){return b.e-a.e;});
    var best=ents[0];
    if(!best){h+='<div class="pr-sum-card"><div class="pr-sum-lift">'+LL[lk]+'</div><div class="pr-sum-empty">기록 없음</div></div>';continue;}
    var diff=best.e-ORM[lk],dc=diff>0?'up':diff<0?'dn':'eq';
    h+='<div class="pr-sum-card"><div class="pr-sum-lift">'+LL[lk]+'</div>'
      +'<div class="pr-sum-e1rm">'+best.e+'<span>kg</span></div>'
      +'<div class="pr-sum-meta">'+best.wl+' · '+best.w+'×'+best.r+'reps</div>'
      +'<div class="pr-sum-vs '+dc+'">'+(diff>0?'+':'')+R(diff)+'kg vs 1RM</div></div>';
  }
  h+='</div>';

  // per-lift
  for(var li2=0;li2<lifts.length;li2++){
    var lk2=lifts[li2],ents2=[];
    for(var k2 in PR_LOG)if(PR_LOG[k2].lk===lk2)ents2.push(PR_LOG[k2]);
    ents2.sort(function(a,b){return a.wi-b.wi;});
    h+='<div class="pr-sect"><div class="pr-sect-hd">'+LL[lk2]+' <span class="badge '+LB[lk2]+'">'+lk2.toUpperCase()+'</span></div>';
    if(!ents2.length){h+='<div class="pr-empty">아직 '+LL[lk2]+' PR 세트 기록 없음<br>Workout 탭에서 reps 입력 → Save</div></div>';continue;}
    var maxE=0;for(var ei=0;ei<ents2.length;ei++){if(ents2[ei].e>maxE)maxE=ents2[ei].e;}
    var chart='<div class="pr-chart">';
    for(var ei2=0;ei2<ents2.length;ei2++){
      var en=ents2[ei2],bh=Math.max(4,Math.round(en.e/maxE*68));
      chart+='<div class="pr-bar-w"><div class="pr-bar-v">'+en.e+'</div>'
        +'<div class="pr-bar'+(en.e===maxE?' best':'')+'" style="height:'+bh+'px"></div>'
        +'<div class="pr-bar-l">'+en.wl+'</div></div>';
    }
    chart+='</div>';
    var rows='';
    for(var ri=0;ri<ents2.length;ri++){
      var en2=ents2[ri],prev=ents2[ri-1],dStr='',dCls='eq';
      if(prev){var dv=en2.e-prev.e;dStr=(dv>0?'+':'')+R(dv)+'kg';dCls=dv>0?'up':dv<0?'dn':'eq';}
      rows+='<tr><td>'+en2.wl+'</td><td class="td-e">'+en2.e+'kg</td><td>'+en2.w+'×'+en2.r+'</td><td class="td-d '+dCls+'">'+dStr+'</td></tr>';
    }
    h+=chart+'<table class="pr-tbl"><thead><tr><th>Week</th><th>Est.1RM</th><th>Set</th><th>Δ</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }
  h+='</div>';
  el('mc').innerHTML=h;
}
function clrPR(){if(confirm('모든 PR 기록을 초기화할까요?')){PR_LOG={};saveState();renderPR();}}

// ═══════════════════════════════════════════════
//  PROGRESSION TAB
// ═══════════════════════════════════════════════
function renderProg(){
  var lifts=['sq','dl','bp','ohp'],hasPR=Object.keys(PR_LOG).length>0,hasAst=Object.keys(ASST_LOG).length>0;
  var h='<div style="padding:16px">';
  h+='<div class="view-title">Progression</div>'
    +'<div class="view-sub">사이클별 메인 리프트 Est. 1RM + 보조 운동 무게 비교</div>';

  h+='<div class="prog-sect-ttl">Main Lifts — Est. 1RM</div>';
  if(!hasPR){h+='<div class="prog-empty">PR 세트를 아직 기록하지 않았어요.<br>Workout 탭 → PR Set reps 입력 → Save</div>';}
  else{
    for(var li=0;li<lifts.length;li++){
      var lk=lifts[li],byCycle={};
      for(var k in PR_LOG){var en=PR_LOG[k];if(en.lk!==lk)continue;var c=en.cycle||1;if(!byCycle[c]||en.e>byCycle[c].e)byCycle[c]=en;}
      var cks=Object.keys(byCycle).map(Number).sort(function(a,b){return a-b;});
      if(!cks.length)continue;
      var maxE=0;for(var ci=0;ci<cks.length;ci++){if(byCycle[cks[ci]].e>maxE)maxE=byCycle[cks[ci]].e;}
      var chart='<div class="prog-chart">';
      for(var ci2=0;ci2<cks.length;ci2++){
        var c2=cks[ci2],en2=byCycle[c2],bh=Math.max(4,Math.round(en2.e/maxE*58));
        chart+='<div class="pg-bar-w"><div class="pg-bar-v" style="color:var(--amber)">'+en2.e+'</div>'
          +'<div class="pg-bar" style="height:'+bh+'px;background:'+(en2.e===maxE?'var(--amber)':'rgba(240,149,10,.2)')+'"></div>'
          +'<div class="pg-bar-l"><span class="cbadge c'+Math.min(c2,5)+'">C'+c2+'</span></div></div>';
      }
      chart+='</div>';
      var rows='';
      for(var ri=0;ri<cks.length;ri++){
        var c3=cks[ri],en3=byCycle[c3],prev=ri>0?byCycle[cks[ri-1]]:null;
        var dv=prev?en3.e-prev.e:null;
        var delta=dv===null?'':'<span class="pdelta '+(dv>0?'up':dv<0?'dn':'eq')+'">'+(dv>0?'+':'')+R(dv)+'kg</span>';
        rows+='<tr><td><span class="cbadge c'+Math.min(c3,5)+'">C'+c3+'</span></td>'
          +'<td style="color:var(--amber);font-weight:500">'+en3.e+'kg</td>'
          +'<td>'+en3.w+'×'+en3.r+'reps</td><td>'+delta+'</td></tr>';
      }
      h+='<div class="prog-card"><div class="prog-card-ttl"><span class="badge '+LB[lk]+'">'+lk.toUpperCase()+'</span>'+LL[lk]+'</div>'
        +chart+'<table class="prog-tbl"><thead><tr><th>Cycle</th><th>Est.1RM</th><th>Set</th><th>Δ</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
    }
  }

  h+='<div class="prog-sect-ttl">Assistance — Weight</div>';
  if(!hasAst){h+='<div class="prog-empty">보조 운동 무게를 아직 기록하지 않았어요.<br>Workout 탭 → 보조 운동 무게 입력 → Save</div>';}
  else{
    var groups={};
    for(var ak in ASST_LOG){
      var aEnts=ASST_LOG[ak];if(!aEnts.length)continue;
      var gk=aEnts[0].aname+'||'+aEnts[0].dn;
      if(!groups[gk])groups[gk]=[];
      for(var gi=0;gi<aEnts.length;gi++)groups[gk].push(aEnts[gi]);
    }
    var gks=Object.keys(groups);
    if(!gks.length){h+='<div class="prog-empty">기록 없음</div>';}
    else{
      for(var gki=0;gki<gks.length;gki++){
        var all=groups[gks[gki]],byC={};
        for(var ai2=0;ai2<all.length;ai2++){var cv=all[ai2].cycle||1;if(!byC[cv]||all[ai2].kg>byC[cv].kg)byC[cv]=all[ai2];}
        var cks2=Object.keys(byC).map(Number).sort(function(a,b){return a-b;});
        if(!cks2.length)continue;
        var maxKg=0;for(var ci3=0;ci3<cks2.length;ci3++){if(byC[cks2[ci3]].kg>maxKg)maxKg=byC[cks2[ci3]].kg;}
        var parts=gks[gki].split('||'),aname=parts[0],dn2=parts[1];
        var chart2='<div class="prog-chart">';
        for(var ci4=0;ci4<cks2.length;ci4++){
          var c4=cks2[ci4],en4=byC[c4],bh2=Math.max(4,Math.round(en4.kg/maxKg*58));
          chart2+='<div class="pg-bar-w"><div class="pg-bar-v" style="color:var(--blue)">'+en4.kg+'</div>'
            +'<div class="pg-bar" style="height:'+bh2+'px;background:'+(en4.kg===maxKg?'var(--blue)':'rgba(91,156,246,.2)')+'"></div>'
            +'<div class="pg-bar-l"><span class="cbadge c'+Math.min(c4,5)+'">C'+c4+'</span></div></div>';
        }
        chart2+='</div>';
        var rows2='';
        for(var ri2=0;ri2<cks2.length;ri2++){
          var c5=cks2[ri2],en5=byC[c5],prev2=ri2>0?byC[cks2[ri2-1]]:null;
          var dv2=prev2?en5.kg-prev2.kg:null;
          var delta2=dv2===null?'':'<span class="pdelta '+(dv2>0?'up':dv2<0?'dn':'eq')+'">'+(dv2>0?'+':'')+dv2+'kg</span>';
          rows2+='<tr><td><span class="cbadge c'+Math.min(c5,5)+'">C'+c5+'</span></td>'
            +'<td style="color:var(--blue);font-weight:500">'+en5.kg+'kg</td>'
            +'<td>'+(en5.wl||'')+'</td><td>'+delta2+'</td></tr>';
        }
        h+='<div class="prog-card"><div class="prog-card-ttl"><span style="font-size:10px;color:var(--tx3)">'+dn2+'</span><span style="margin-left:5px">'+aname+'</span></div>'
          +chart2+'<table class="prog-tbl"><thead><tr><th>Cycle</th><th>Weight</th><th>Week</th><th>Δ</th></tr></thead><tbody>'+rows2+'</tbody></table></div>';
      }
    }
  }
  h+='</div>';
  el('mc').innerHTML=h;
}

// ═══════════════════════════════════════════════
//  SETTINGS TAB
// ═══════════════════════════════════════════════
function renderSettings(){
  var lv=LVL[LEVEL],hr=hrZone(AGE);
  var h='<div class="settings-screen">';
  h+='<div class="settings-title">Settings</div>';

  // Level
  h+='<div class="settings-section">';
  h+='<div class="settings-row">'
    +'<div><div class="settings-row-label">레벨</div><div class="settings-row-sub">TM 퍼센트 결정</div></div>'
    +'<div class="lvl-seg">'
    +'<button class="lvl-seg-btn beg'+(LEVEL==='beg'?' on':'')+'" onclick="sLevel(\'beg\')">Beg</button>'
    +'<button class="lvl-seg-btn int'+(LEVEL==='int'?' on':'')+'" onclick="sLevel(\'int\')">Int</button>'
    +'<button class="lvl-seg-btn adv'+(LEVEL==='adv'?' on':'')+'" onclick="sLevel(\'adv\')">Adv</button>'
    +'</div></div>';
  h+='<div class="lvl-note-s '+LEVEL+'">'+lv.note+'</div>';
  h+='</div>';

  // 1RM inputs
  h+='<div class="settings-section">';
  var fields=[{k:'sq',l:'Squat 1RM'},{k:'dl',l:'Deadlift 1RM'},{k:'bp',l:'Bench Press 1RM'},{k:'ohp',l:'OHP 1RM'}];
  for(var i=0;i<fields.length;i++){
    var f=fields[i],tm=R(ORM[f.k]*lv.tm);
    h+='<div class="settings-row">'
      +'<div><div class="settings-row-label">'+f.l+'</div><div class="s-tm-hint" id="stmh-'+f.k+'">TM → <span>'+tm+' kg</span></div></div>'
      +'<div style="display:flex;align-items:center;gap:5px">'
      +'<input class="s-num-inp" type="number" min="20" max="500" step="2.5" value="'+ORM[f.k]+'" inputmode="decimal" oninput="sOrm(\''+f.k+'\',this.value)">'
      +'<span style="font-size:12px;color:var(--tx3);font-family:var(--mono)">kg</span>'
      +'</div></div>';
  }
  h+='</div>';

  // TM Direct Override section
  var baseTM=calcBaseTM();
  var lv2=LVL[LEVEL];
  var tmFields=[{k:'sq',l:'Squat TM'},{k:'dl',l:'Deadlift TM'},{k:'bp',l:'Bench TM'},{k:'ohp',l:'OHP TM'}];
  h+='<div class="settings-section">';
  h+='<div style="padding:12px 16px;font-size:11px;color:var(--blue);font-family:var(--mono);letter-spacing:.05em;border-bottom:1px solid var(--line)">🏋 TRAINING MAX 직접 설정</div>';
  h+='<div style="padding:10px 16px 4px;font-size:10px;color:var(--tx3);font-family:var(--mono);line-height:1.7">'+(TM_BASE?'현재: 수동 설정 중':'현재: 1RM × '+Math.round(lv2.tm*100)+'% 자동 계산')+'</div>';
  for(var j=0;j<tmFields.length;j++){
    var tf=tmFields[j],curTM=baseTM[tf.k];
    h+='<div class="settings-row">'
      +'<div><div class="settings-row-label">'+tf.l+'</div><div class="s-tm-hint">현재 <span>'+curTM+'kg</span></div></div>'
      +'<div style="display:flex;align-items:center;gap:5px">'
      +'<input class="s-num-inp" type="number" min="20" max="500" step="2.5" value="'+curTM+'" inputmode="decimal" id="stm-'+tf.k+'">'
      +'<span style="font-size:12px;color:var(--tx3);font-family:var(--mono)">kg</span>'
      +'</div></div>';
  }
  h+='<div style="padding:10px 16px 12px;display:flex;gap:8px">'
    +'<button onclick="applyManualTM()" style="flex:1;padding:10px;border-radius:var(--rs);border:1px solid rgba(91,156,246,.3);background:rgba(91,156,246,.1);color:var(--blue);font-size:12px;font-weight:500">TM 적용</button>'
    +'<button onclick="resetTM()" style="flex:1;padding:10px;border-radius:var(--rs);border:1px solid var(--line);background:transparent;color:var(--tx3);font-size:12px">'+(TM_BASE?'자동 계산으로 되돌리기':'자동 계산 중')+'</button>'
    +'</div>';
  h+='</div>';

  // Age
  h+='<div class="settings-section"><div class="settings-row">'
    +'<div><div class="settings-row-label">나이</div>'
    +'<div class="s-tm-hint">Zone 2: <span id="s-hr-hint">'+hr.lo+'–'+hr.hi+' bpm</span></div></div>'
    +'<div style="display:flex;align-items:center;gap:5px">'
    +'<input class="s-num-inp" type="number" min="15" max="80" value="'+AGE+'" inputmode="numeric" oninput="sAge(this.value)">'
    +'<span style="font-size:12px;color:var(--tx3);font-family:var(--mono)">세</span>'
    +'</div></div></div>';

  // Reset
  // Supabase config section
  h+='<div class="settings-section">';
  h+='<div style="padding:12px 16px;font-size:11px;color:var(--teal);font-family:var(--mono);letter-spacing:.05em;border-bottom:1px solid var(--line)">☁ CLOUD SYNC (Supabase)</div>';
  h+='<div class="settings-row">'
    +'<div><div class="settings-row-label">Project URL</div><div class="settings-row-sub">supabase.co/project/...</div></div>'
    +'<input id="s-supa-url" style="width:160px;padding:7px 9px;border-radius:var(--rs);border:1px solid var(--line2);background:var(--bg3);color:var(--tx);font-family:var(--mono);font-size:10px;outline:none" placeholder="https://xxx.supabase.co" value="'+SUPA_URL+'">'
    +'</div>';
  h+='<div class="settings-row">'
    +'<div><div class="settings-row-label">Anon Key</div><div class="settings-row-sub">Settings → API</div></div>'
    +'<input id="s-supa-key" style="width:160px;padding:7px 9px;border-radius:var(--rs);border:1px solid var(--line2);background:var(--bg3);color:var(--tx);font-family:var(--mono);font-size:10px;outline:none" placeholder="eyJhbGci..." value="'+SUPA_KEY+'">'
    +'</div>';
  h+='<div class="settings-row">'
    +'<div><div class="settings-row-label">User ID</div><div class="settings-row-sub">모든 기기에서 동일하게 입력</div></div>'
    +'<input id="s-user-id" style="width:120px;padding:7px 9px;border-radius:var(--rs);border:1px solid var(--line2);background:var(--bg3);color:var(--tx);font-family:var(--mono);font-size:13px;outline:none" placeholder="예: john531" value="'+USER_ID+'">'
    +'</div>';
  h+='<div style="padding:0 16px 10px;font-size:10px;color:var(--tx3);font-family:var(--mono);line-height:1.7">'
    +'📱 폰 여러 대에서 동일한 User ID를 사용하면<br>모든 기기가 같은 데이터를 공유해요.<br>'
    +'타임스탬프 기준으로 최신 데이터가 우선 적용됩니다.'
    +'</div>';
  h+='<div style="padding:10px 16px;display:flex;gap:8px">'
    +'<button onclick="saveSupaConfig()" style="flex:1;padding:10px;border-radius:var(--rs);border:1px solid rgba(41,201,154,.3);background:rgba(41,201,154,.1);color:var(--teal);font-size:12px;font-weight:500">저장 &amp; 연결</button>'
    +'<button onclick="manualPull()" style="flex:1;padding:10px;border-radius:var(--rs);border:1px solid var(--line2);background:transparent;color:var(--tx2);font-size:12px">클라우드에서 불러오기</button>'
    +'</div>';
  h+='<div id="s-sync-status" style="padding:0 16px 12px;font-size:10px;color:var(--tx3);font-family:var(--mono);min-height:20px"></div>';
  h+='</div>';

  h+='<button class="reset-btn" onclick="resetAll()">⚠ 모든 PR / 보조 운동 기록 초기화</button>';
  h+='</div>';
  el('mc').innerHTML=h;
}
function sLevel(lv){LEVEL=lv;saveState();renderSettings();}
function applyManualTM(){
  var sq  = parseFloat((document.getElementById('stm-sq') ||{}).value);
  var dl  = parseFloat((document.getElementById('stm-dl') ||{}).value);
  var bp  = parseFloat((document.getElementById('stm-bp') ||{}).value);
  var ohp = parseFloat((document.getElementById('stm-ohp')||{}).value);
  if([sq,dl,bp,ohp].some(function(v){return isNaN(v)||v<20;})){
    alert('올바른 값을 입력해주세요 (20kg 이상)'); return;
  }
  TM_BASE={sq:R(sq),dl:R(dl),bp:R(bp),ohp:R(ohp)};
  saveState(); renderSettings();
}
function resetTM(){
  TM_BASE=null; saveState(); renderSettings();
}
function sOrm(k,v){var n=parseFloat(v);if(!isNaN(n)&&n>20){ORM[k]=n;saveState();var e=el('stmh-'+k);if(e)e.innerHTML='TM → <span>'+R(ORM[k]*LVL[LEVEL].tm)+' kg</span>';}}
function sAge(v){var n=parseInt(v);if(n>=15&&n<=80){AGE=n;saveState();var hr=hrZone(n);var e=el('s-hr-hint');if(e)e.textContent=hr.lo+'–'+hr.hi+' bpm';}}
function saveSupaConfig() {
  var url = (document.getElementById('s-supa-url')||{}).value || '';
  var key = (document.getElementById('s-supa-key')||{}).value || '';
  var uid = (document.getElementById('s-user-id')||{}).value || '';
  SUPA_URL = url.trim();
  SUPA_KEY = key.trim();
  USER_ID  = uid.trim();
  // persist config separately so it survives reset
  try { localStorage.setItem('w531_supa', JSON.stringify({url:SUPA_URL,key:SUPA_KEY,uid:USER_ID})); } catch(e) {}
  initSupabase();
  var st = document.getElementById('s-sync-status');
  if (!supaClient) {
    if (st) st.textContent = '✗ URL / Key를 확인해주세요';
    return;
  }
  if (st) st.textContent = '⟳ 연결 중...';
  pushCloud().then(function() {
    if (st) st.textContent = '✓ 클라우드에 업로드 완료';
  }).catch(function() {
    if (st) st.textContent = '✗ 업로드 실패 — 네트워크 확인';
  });
}
async function manualPull() {
  var st = document.getElementById('s-sync-status');
  if (!supaClient || !USER_ID) {
    if (st) st.textContent = '먼저 User ID를 설정하고 저장 & 연결을 눌러주세요';
    return;
  }
  if (st) st.textContent = '⟳ 클라우드에서 불러오는 중...';
  var result = await pullCloud();
  if (result === 'updated') {
    if (st) st.textContent = '✓ 최신 데이터로 업데이트 — 새로고침합니다';
    setTimeout(function() { location.reload(); }, 1200);
  } else if (result === 'already_latest') {
    if (st) st.textContent = '✓ 이미 최신 상태예요';
  } else {
    if (st) st.textContent = '✗ 데이터 없음 또는 네트워크 오류';
  }
}
function resetAll(){if(confirm('모든 기록(PR + 보조 운동)을 초기화할까요?')){PR_LOG={};ASST_LOG={};saveState();renderSettings();}}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
//  CYCLE COMPLETE MODAL
// ═══════════════════════════════════════════════
function showCycleModal() {
  var base = calcBaseTM();
  // Calculate what Auto Progress would look like
  var next = {
    sq:  base.sq  + 5,
    dl:  base.dl  + 5,
    bp:  base.bp  + 2.5,
    ohp: base.ohp + 2.5,
  };
  // Update modal cycle number
  var cn = document.getElementById('modal-cycle-num');
  if(cn) cn.textContent = CYCLE;

  // Build TM comparison grid
  var grid = document.getElementById('modal-tm-grid');
  if(grid){
    var lifts = [{k:'sq',l:'SQUAT'},{k:'dl',l:'DEADLIFT'},{k:'bp',l:'BENCH'},{k:'ohp',l:'OHP'}];
    var gh = '';
    for(var i=0;i<lifts.length;i++){
      var lk=lifts[i].k;
      gh += '<div class="modal-tm-card">'
        +'<div class="modal-tm-lbl">'+lifts[i].l+'</div>'
        +'<div class="modal-tm-row">'
        +'<span class="modal-tm-cur">'+base[lk]+'kg</span>'
        +'<span class="modal-tm-arrow">→</span>'
        +'<span class="modal-tm-new">'+next[lk]+'kg</span>'
        +'</div></div>';
    }
    grid.innerHTML = gh;
  }
  var m = document.getElementById('cycle-modal');
  if(m){ m.style.display='flex'; document.body.style.overflow='hidden'; }
}
function closeModal() {
  var m = document.getElementById('cycle-modal');
  if(m){ m.style.display='none'; document.body.style.overflow=''; }
}
function modalBgClick(e) {
  if(e.target.id==='cycle-modal') closeModal();
}
function doProgress() {
  // Apply Auto Progress: bump TM_BASE by +5 for SQ/DL, +2.5 for BP/OHP
  var base = calcBaseTM();
  TM_BASE = {
    sq:  base.sq  + 5,
    dl:  base.dl  + 5,
    bp:  base.bp  + 2.5,
    ohp: base.ohp + 2.5,
  };
  CYCLE = CYCLE + 1;
  saveState();
  closeModal();
  renderWorkout();
}
function doKeep() {
  // Keep current TM: lock it in TM_BASE as-is (no bump)
  var base = calcBaseTM();
  TM_BASE = {sq:base.sq, dl:base.dl, bp:base.bp, ohp:base.ohp};
  CYCLE = CYCLE + 1;
  saveState();
  closeModal();
  renderWorkout();
}

// Start
initAndSync().then(function() {
  renderWorkout();
}).catch(function() {
  loadLocal();
  renderWorkout();
});

// Auto-pull when app comes to foreground (phone switch)
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' && supaClient && USER_ID) {
    pullCloud().then(function(result) {
      if (result === 'updated') {
        // Re-render current tab silently
        if (TAB === 'workout')   renderWorkout();
        else if (TAB === 'pr')   renderPR();
        else if (TAB === 'prog') renderProg();
      }
    });
  }
});
</script>
